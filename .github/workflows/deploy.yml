name: Deploy 水試所多國語音轉譯小幫手

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── 1. Lint & basic checks ──────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py && echo "✅ Syntax OK"

  # ── 2. Deploy to Render (optional) ──────────
  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ vars.RENDER_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ vars.RENDER_DEPLOY_HOOK }}"
          echo "🚀 Render deploy triggered"

  # ── 3. Deploy to Railway (optional) ─────────
  deploy-railway:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
